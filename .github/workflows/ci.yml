name: PySide6 CI/CD (Fedora)

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  # --- TEST STAGE ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Speeds up your private repo builds

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcb-cursor0 libxkbcommon-x11-0 x11-utils \
            libegl1 libgles2 libdbus-1-3 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0
          pip install -r requirements.txt pytest-qt

      - name: Run Tests
        env:
          PYTEST_QT_API: pyside6
        # Use xvfb-run to provide a virtual display for PySide6
        run: xvfb-run pytest

  # --- BUILD STAGE (Fedora) ---
  build:
    needs: test
    # This ensures the build ONLY happens when you push a tag starting with 'v'
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Fedora System Dependencies
        run: |
          dnf install -y python3-pip python3-devel gcc mesa-libGL \
          libX11-xcb xcb-util-cursor xcb-util-wm xcb-util-keysyms \
          xcb-util-renderutil libxkbcommon-x11

      - name: Install Python Dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Package with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fedora-Executable
          path: dist/app
