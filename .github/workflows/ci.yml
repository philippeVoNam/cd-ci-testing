name: PySide6 CI/CD

on: [push, pull_request]

jobs:
  # --- TEST STAGE ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 x11-utils
          # These are the specific libraries needed for Qt/PySide6 to initialize
          sudo apt-get install -y \
            libegl1 \
            libgles2 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            x11-utils
          pip install -r requirements.txt
      - name: Run Tests
        env:
          PYTEST_QT_API: pyside6  # This tells pytest-qt to use PySide6
        run: pytest

  # --- BUILD STAGE ---
  build:
    needs: test  # Only build if tests pass
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' # Only build on pushes to main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Package with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Executable
          path: dist/app.exe
