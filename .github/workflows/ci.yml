name: PySide6 CI/CD (Fedora)

on: [push, pull_request]

jobs:
  # --- TEST STAGE ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Added xvfb here to solve your "could not find Xvfb" error
          sudo apt-get install -y xvfb libxcb-cursor0 libxkbcommon-x11-0 x11-utils
          sudo apt-get install -y \
            libegl1 libgles2 libdbus-1-3 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0
          pip install -r requirements.txt
      - name: Run Tests
        env:
          PYTEST_QT_API: pyside6
        run: pytest

  # --- BUILD STAGE (Fedora) ---
  build:
    needs: test
    runs-on: ubuntu-latest
    # Using a container is the standard way to get a Fedora environment in GitHub Actions
    container:
      image: fedora:latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Install Fedora System Dependencies
        run: |
          dnf install -y python3-pip python3-devel gcc mesa-libGL \
          libX11-xcb xcb-util-cursor xcb-util-wm xcb-util-keysyms \
          xcb-util-renderutil libxkbcommon-x11

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Package with PyInstaller
        run: |
          # Note: No .exe extension on Linux
          pyinstaller --noconfirm --onefile --windowed app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fedora-Executable
          path: dist/app  # The binary name will just be 'app'
